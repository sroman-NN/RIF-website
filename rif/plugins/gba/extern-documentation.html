<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Docs GBA / ARM7TDMI / Thumb</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .tabs {
      display: flex;
      height: 42px;
      flex: 0 0 42px;
      background: #181818;
      border-bottom: 1px solid #333;
      overflow-x: auto;
    }

    button {
      border: 0;
      padding: 0 14px;
      background: #222;
      color: #ddd;
      cursor: pointer;
      border-right: 1px solid #333;
      font-size: 13px;
      white-space: nowrap;
    }

    button.active {
      background: #365cff;
      color: white;
    }

    iframe {
      flex: 1;
      width: 100%;
      min-height: 0;
      border: 0;
      background: white;
    }

    .fallback {
      position: absolute;
      right: 10px;
      top: 8px;
      font-size: 12px;
      color: #bbb;
      text-decoration: none;
    }

    .fallback:hover {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="tabs">
    <button class="active" onclick="openDoc(this, 'https://rust-console.github.io/gbatek-gbaonly/')">
      GBATEK GBA-only
    </button>

    <button onclick="openDoc(this, 'https://gbadev.net/tonc/intro.html')">
      Tonc tutorial
    </button>

    <button onclick="openDoc(this, 'https://www.coranac.com/tonc/text/asm.htm')">
      Tonc ARM/Thumb
    </button>

    <button onclick="openDoc(this, 'https://problemkaputt.de/gbatek.htm')">
      GBATEK Full
    </button>

    <button onclick="openDoc(this, 'https://mgba.io/')">
      mGBA
    </button>

    <button onclick="openDoc(this, 'https://www.gbadev.org/docs.php')">
      gbadev docs
    </button>

    <button onclick="openDoc(this, 'https://www.copetti.org/es/writings/consoles/game-boy-advance/')">
      Copetti ES
    </button>
  </div>

  <a id="fallback" class="fallback" href="https://rust-console.github.io/gbatek-gbaonly/" target="_blank" rel="noreferrer">
    open in browser
  </a>
  <iframe id="viewer" src="https://rust-console.github.io/gbatek-gbaonly/"></iframe>

  <script>
    function openDoc(button, url) {
      document.querySelectorAll("button").forEach(btn => {
        btn.classList.remove("active");
      });

      button.classList.add("active");
      document.getElementById("viewer").src = url;
      document.getElementById("fallback").href = url;
    }
  </script>
</body>
</html>
