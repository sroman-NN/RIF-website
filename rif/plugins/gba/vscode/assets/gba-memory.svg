<svg xmlns="http://www.w3.org/2000/svg" width="760" height="280" viewBox="0 0 760 280" role="img" aria-label="GBA memory map">
  <rect width="760" height="280" fill="#111827"/>
  <text x="28" y="42" fill="#f8fafc" font-family="Segoe UI, Arial" font-size="24" font-weight="700">GBA Memory Map</text>
  <g font-family="Consolas, monospace" font-size="15">
    <rect x="30" y="70" width="150" height="56" rx="8" fill="#2563eb"/>
    <text x="48" y="102" fill="#fff">0x02000000</text><text x="48" y="120" fill="#bfdbfe">EWRAM</text>
    <rect x="196" y="70" width="150" height="56" rx="8" fill="#0f766e"/>
    <text x="214" y="102" fill="#fff">0x03000000</text><text x="214" y="120" fill="#ccfbf1">IWRAM</text>
    <rect x="362" y="70" width="150" height="56" rx="8" fill="#9333ea"/>
    <text x="380" y="102" fill="#fff">0x04000000</text><text x="380" y="120" fill="#e9d5ff">IO</text>
    <rect x="528" y="70" width="150" height="56" rx="8" fill="#ca8a04"/>
    <text x="546" y="102" fill="#fff">0x05000000</text><text x="546" y="120" fill="#fef3c7">Palette</text>
    <rect x="112" y="156" width="180" height="60" rx="8" fill="#16a34a"/>
    <text x="132" y="190" fill="#fff">0x06000000</text><text x="132" y="208" fill="#dcfce7">VRAM 16-bit writes</text>
    <rect x="316" y="156" width="180" height="60" rx="8" fill="#dc2626"/>
    <text x="336" y="190" fill="#fff">0x07000000</text><text x="336" y="208" fill="#fee2e2">OAM sprites</text>
    <rect x="520" y="156" width="180" height="60" rx="8" fill="#475569"/>
    <text x="540" y="190" fill="#fff">0x08000000</text><text x="540" y="208" fill="#e2e8f0">Game Pak ROM</text>
  </g>
</svg>
