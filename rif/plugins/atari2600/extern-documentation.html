<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Docs Atari 2600 / 6507 / 6502</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .tabs {
      display: flex;
      height: 42px;
      flex: 0 0 42px;
      background: #181818;
      border-bottom: 1px solid #333;
      overflow-x: auto;
    }

    button {
      border: 0;
      padding: 0 14px;
      background: #222;
      color: #ddd;
      cursor: pointer;
      border-right: 1px solid #333;
      font-size: 13px;
      white-space: nowrap;
    }

    button.active {
      background: #365cff;
      color: white;
    }

    iframe {
      flex: 1;
      width: 100%;
      min-height: 0;
      border: 0;
      background: white;
    }

    .fallback {
      position: absolute;
      right: 10px;
      top: 8px;
      font-size: 12px;
      color: #bbb;
      text-decoration: none;
    }

    .fallback:hover {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="tabs">
    <button class="active" onclick="openDoc(this, 'https://alienbill.com/2600/101/docs/stella.html')">
      Stella Programmer's Guide
    </button>

    <button onclick="openDoc(this, 'https://www.randomterrain.com/atari-2600-memories-tutorial-andrew-davie-01.html')">
      Andrew Davie - Atari 2600 Programming
    </button>

    <button onclick="openDoc(this, 'https://www.masswerk.at/6502/6502_instruction_set.html')">
      Masswerk - 6502 Instruction Set
    </button>

    <button onclick="openDoc(this, 'https://www.computerarcheology.com/Atari2600/Stella.html')">
      Computer Archeology - TIA / RIOT Map
    </button>

    <button onclick="openDoc(this, 'https://www.atarimax.com/jindroush.atari.org/2600crio.html')">
      RIOT 6532 Notes
    </button>
  </div>

  <a id="fallback" class="fallback" href="https://alienbill.com/2600/101/docs/stella.html" target="_blank" rel="noreferrer">
    open in browser
  </a>
  <iframe id="viewer" src="https://alienbill.com/2600/101/docs/stella.html"></iframe>

  <script>
    function openDoc(button, url) {
      document.querySelectorAll("button").forEach(btn => {
        btn.classList.remove("active");
      });

      button.classList.add("active");
      document.getElementById("viewer").src = url;
      document.getElementById("fallback").href = url;
    }
  </script>
</body>
</html>
