<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Docs Mega Drive / Genesis / Motorola 68000</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
    }

    .tabs {
      display: flex;
      height: 42px;
      background: #181818;
      border-bottom: 1px solid #333;
      overflow-x: auto;
    }

    button {
      border: 0;
      padding: 0 14px;
      background: #222;
      color: #ddd;
      cursor: pointer;
      border-right: 1px solid #333;
      font-size: 13px;
      white-space: nowrap;
    }

    button.active {
      background: #365cff;
      color: white;
    }

    iframe {
      width: 100vw;
      height: calc(100vh - 42px);
      border: 0;
      background: white;
    }
  </style>
</head>
<body>
  <div class="tabs">
    <button class="active" onclick="openDoc(this, 'https://www.plutiedev.com/mirror/kabuto-hardware-notes')">
      Plutiedev - Mega Drive Hardware Notes
    </button>

    <button onclick="openDoc(this, 'https://segaretro.org/Sega_Mega_Drive/Technical_specifications')">
      Sega Retro - Mega Drive Technical Specs
    </button>

    <button onclick="openDoc(this, 'https://www.easy68k.com/paulrsm/doc/trick68k.htm')">
      Easy68K - 68000 Tricks and Traps
    </button>
  </div>

  <iframe id="viewer" src="https://www.plutiedev.com/mirror/kabuto-hardware-notes"></iframe>

  <script>
    function openDoc(button, url) {
      document.querySelectorAll("button").forEach(btn => {
        btn.classList.remove("active");
      });

      button.classList.add("active");
      document.getElementById("viewer").src = url;
    }
  </script>
</body>
</html>
